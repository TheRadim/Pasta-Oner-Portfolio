<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta Oner | Home</title>
  <meta
    name="description"
    content="A clean, multi-page portfolio concept for Czech artist Pasta Oner, led by the current exhibition and a flatter editorial layout."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="home">
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html" aria-label="Go to homepage">
          <img src="assets/logo.png" alt="Pasta Oner logo">
        </a>
        <div class="site-header__actions">
          <button class="menu-toggle" type="button" data-menu-toggle aria-controls="siteNavPanel" aria-expanded="false">
            <span class="menu-toggle__label" data-ui="menu_open">Menu</span>
            <span class="menu-toggle__icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <div class="menu-panel" id="siteNavPanel" data-menu-panel aria-hidden="true">
        <div class="menu-panel__header">
          <span class="menu-panel__eyebrow">Pasta Oner</span>
          <button class="menu-close" type="button" data-menu-close aria-label="Close menu" data-ui="menu_close">Close</button>
        </div>
        <div class="menu-panel__body">
          <ul class="site-nav" data-site-nav></ul>
          <div class="menu-panel__tools">
            <div class="menu-panel__tool-row">
              <span class="menu-panel__eyebrow" data-ui="language_switch">Language</span>
              <div class="language-switch language-switch--menu" role="group" aria-label="Language switch">
                <button class="language-switch__button" type="button" data-set-lang="cs">CZ</button>
                <button class="language-switch__button" type="button" data-set-lang="en">EN</button>
              </div>
            </div>
            <div class="menu-panel__tool-row">
              <span class="menu-panel__eyebrow" data-ui="theme_switch">Theme</span>
              <div class="language-switch language-switch--menu" role="group" aria-label="Theme switch">
                <button class="language-switch__button" type="button" data-set-theme="light" data-ui="theme_light">Light</button>
                <button class="language-switch__button" type="button" data-set-theme="dark" data-ui="theme_dark">Dark</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="menu-backdrop" type="button" data-menu-close tabindex="-1" aria-hidden="true"></button>
    </header>

    <main class="page-main">
      <section class="landing-grid section-line">
        <div class="landing-gesture" aria-hidden="true">
          <img src="assets/hands.png" alt="">
        </div>
        <div class="landing-grid__copy">
          <span class="section-kicker" data-home-kicker></span>
          <h1 class="display-title" data-home-title></h1>
          <p class="lead-copy" data-home-copy></p>
          <p class="page-note" data-home-note></p>
          <div class="hero-actions">
            <a class="button-link button-link--filled" href="works.html" data-ui="home_primary_cta">View artworks</a>
            <a class="button-link" href="contact.html" data-ui="home_secondary_cta">Contact the artist</a>
          </div>
        </div>
        <aside class="poster-panel">
          <span class="section-kicker" data-ui="current_exhibition">Current exhibition</span>
          <div class="poster-panel__image">
            <a class="poster-panel__link" href="exhibitions.html" aria-label="Open exhibitions page">
              <img src="assets/currentexibit.jpg" alt="Current exhibition poster">
            </a>
          </div>
        </aside>
      </section>

      <section class="section-line home-directory">
        <div class="home-route-list" data-home-links></div>
      </section>
    </main>

    <footer class="site-footer" data-site-footer></footer>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
