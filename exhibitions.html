<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta Oner | Exhibitions</title>
  <meta
    name="description"
    content="Exhibition history for Pasta Oner, organized as a cleaner multi-section archive."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="exhibitions">
  <div class="site-shell">
    <header class="site-header">
      <nav class="navbar navbar-expand-xl">
        <div class="container-fluid site-header__inner">
          <a class="site-brand" href="index.html" aria-label="Go to homepage">
            <img src="assets/logo.png" alt="Pasta Oner logo">
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#siteNav"
            aria-controls="siteNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="siteNav">
            <ul class="navbar-nav ms-auto site-nav" data-site-nav></ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-hero page-frame">
        <div class="row g-5 align-items-center">
          <div class="col-lg-6">
            <span class="section-kicker" data-exhibitions-kicker></span>
            <h1 class="display-title" data-exhibitions-title></h1>
            <p class="lead-copy" data-exhibitions-copy></p>
          </div>
          <div class="col-lg-6">
            <div class="media-frame media-frame--exhibition">
              <img src="assets/exibit.png" alt="Exhibition placeholder">
            </div>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="page-frame collections-frame">
          <div class="collections-frame__intro">
            <span class="section-kicker">Collections</span>
            <h2 class="section-title">Selected collections from the source archive.</h2>
          </div>
          <ul class="collections-list" data-collections-list></ul>
        </div>
      </section>

      <section class="page-section">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="timeline-frame page-frame">
              <span class="section-kicker">Solo</span>
              <div data-solo-list></div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="timeline-frame page-frame">
              <span class="section-kicker">Group</span>
              <div data-group-list></div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="timeline-frame page-frame">
              <span class="section-kicker">Public Space</span>
              <div data-public-list></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-site-footer></footer>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
