<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta Oner | Interview</title>
  <meta
    name="description"
    content="A Q&A interview subpage for Pasta Oner, arranged as a quieter pop-art conversation."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="interview">
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html" aria-label="Go to homepage">
          <img src="assets/logo.png" alt="Pasta Oner logo">
        </a>
        <div class="site-header__actions">
          <button class="menu-toggle" type="button" data-menu-toggle aria-controls="siteNavPanel" aria-expanded="false">
            <span class="menu-toggle__label" data-ui="menu_open">Menu</span>
            <span class="menu-toggle__icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <div class="menu-panel" id="siteNavPanel" data-menu-panel aria-hidden="true">
        <div class="menu-panel__header">
          <span class="menu-panel__eyebrow">Pasta Oner</span>
          <button class="menu-close" type="button" data-menu-close aria-label="Close menu" data-ui="menu_close">Close</button>
        </div>
        <div class="menu-panel__body">
          <p class="menu-panel__intro" data-ui="menu_intro">A minimal archive of artworks, exhibitions, writing, and direct contact.</p>
          <ul class="site-nav" data-site-nav></ul>
          <div class="menu-panel__tools">
            <span class="menu-panel__eyebrow" data-ui="language_switch">Language</span>
            <div class="language-switch language-switch--menu" role="group" aria-label="Language switch">
              <button class="language-switch__button" type="button" data-set-lang="cs">CZ</button>
              <button class="language-switch__button" type="button" data-set-lang="en">EN</button>
            </div>
          </div>
        </div>
      </div>
      <button class="menu-backdrop" type="button" data-menu-close tabindex="-1" aria-hidden="true"></button>
    </header>

    <main class="page-main">
      <section class="page-intro section-line">
        <div>
          <span class="section-kicker" data-interview-kicker></span>
          <h1 class="display-title" data-interview-title></h1>
          <p class="lead-copy" data-interview-copy></p>
        </div>
        <aside class="media-panel">
          <div class="media-panel__image">
            <img src="assets/passingphotohorizontal.png" alt="Interview visual element">
          </div>
        </aside>
      </section>

      <section class="interview-flow">
        <div class="essay-list" data-interview-list></div>
      </section>
    </main>

    <footer class="site-footer" data-site-footer></footer>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
