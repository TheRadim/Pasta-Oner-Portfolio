<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta Oner | Interview</title>
  <meta
    name="description"
    content="Interview themes and excerpts for Pasta Oner, reorganized for a cleaner reading experience."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="interview">
  <div class="site-shell">
    <header class="site-header">
      <nav class="navbar navbar-expand-xl">
        <div class="container-fluid site-header__inner">
          <a class="site-brand" href="index.html" aria-label="Go to homepage">
            <img src="assets/logo.png" alt="Pasta Oner logo">
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#siteNav"
            aria-controls="siteNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="siteNav">
            <ul class="navbar-nav ms-auto site-nav" data-site-nav></ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-hero page-frame">
        <div class="row g-5 align-items-center">
          <div class="col-lg-6">
            <span class="section-kicker" data-interview-kicker></span>
            <h1 class="display-title" data-interview-title></h1>
            <p class="lead-copy" data-interview-copy></p>
            <a class="text-link" href="https://www.pastaoner.cz/interview-219" target="_blank" rel="noreferrer noopener">
              Open the original interview
            </a>
          </div>
          <div class="col-lg-6">
            <div class="media-frame media-frame--wide">
              <img src="assets/passingphotohorizontal.png" alt="Interview visual element">
            </div>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="page-frame quote-frame">
          <div class="quote-frame__label">Lead thought</div>
          <p class="quote-frame__quote" data-interview-quote></p>
        </div>
      </section>

      <section class="page-section">
        <div class="essay-list" data-interview-list></div>
      </section>
    </main>

    <footer class="site-footer" data-site-footer></footer>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
